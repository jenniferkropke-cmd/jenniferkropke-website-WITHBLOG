<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>Jennifer Kropke - Creative Direction | Digital Media | Design</title>
    <meta name="title" content="Jennifer Kropke - Creative Direction | Digital Media | Design" />
    <meta name="description" content="Multimedia professional specializing in video production, web design, social campaigns, and educational storytelling for mission-driven organizations. Serving nonprofits, education, and community-focused clients." />
    <meta name="keywords" content="Jennifer Kropke, creative direction, digital media, video production, web design, social media campaigns, nonprofit marketing, educational storytelling, video editing, multimedia production, Chicago creative professional" />
    <meta name="author" content="Jennifer Kropke" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://jenniferkropke.com/" />
    <meta property="og:title" content="Jennifer Kropke - Creative Direction | Digital Media | Design" />
    <meta property="og:description" content="Multimedia professional specializing in video production, web design, social campaigns, and educational storytelling for mission-driven organizations." />
    <meta property="og:image" content="https://jenniferkropke.com/jennifer-kropke.jpg" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://jenniferkropke.com/" />
    <meta property="twitter:title" content="Jennifer Kropke - Creative Direction | Digital Media | Design" />
    <meta property="twitter:description" content="Multimedia professional specializing in video production, web design, social campaigns, and educational storytelling for mission-driven organizations." />
    <meta property="twitter:image" content="https://jenniferkropke.com/jennifer-kropke.jpg" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://jenniferkropke.com/" />
    
    <!-- Netlify Identity Widget -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <div id="root"></div>
    
    <!-- Hidden form for Netlify Forms detection -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="fullName" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="organization" />
      <select name="projectType">
        <option value="video">Video Production</option>
        <option value="website">Website Design</option>
        <option value="social">Social Media Content</option>
        <option value="branding">Brand Identity</option>
        <option value="event">Event Documentation</option>
        <option value="other">Other</option>
      </select>
      <textarea name="description"></textarea>
      <select name="timeline">
        <option value="asap">ASAP</option>
        <option value="1-2weeks">1-2 weeks</option>
        <option value="1month">1 month</option>
        <option value="2-3months">2-3 months</option>
        <option value="flexible">Flexible</option>
      </select>
      <select name="budget">
        <option value="under1k">Under $1,000</option>
        <option value="1k-3k">$1,000 - $3,000</option>
        <option value="3k-5k">$3,000 - $5,000</option>
        <option value="5k-10k">$5,000 - $10,000</option>
        <option value="over10k">$10,000+</option>
      </select>
      <select name="additionalOption">
        <option value="referral">Referred by someone</option>
        <option value="google">Found via Google</option>
        <option value="social">Social Media</option>
        <option value="other">Other</option>
      </select>
      <select name="preference">
        <option value="email">Email</option>
        <option value="phone">Phone</option>
        <option value="either">Either</option>
      </select>
    </form>
    
    <!-- Hidden homepage contact form for Netlify Forms detection -->
    <form name="homepage-contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="subject" />
      <textarea name="message"></textarea>
    </form>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
